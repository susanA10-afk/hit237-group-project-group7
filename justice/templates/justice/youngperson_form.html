{% extends 'justice/base.html' %}

{% block content %}
<h1>Add New Young Person</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">Save</button>
    <a href="{% url 'justice:youngperson-list' %}" class="btn">Cancel</a>
</form>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var dateInput = document.querySelector('input[name="date_of_birth"]');
    if (dateInput) {
        dateInput.type = 'date';
    }
});
</script>
{% endblock %}
