{% extends 'justice/base.html' %}

{% block content %}
<h1>{% if object %}Update Intervention{% else %}Add New Intervention{% endif %}</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">Save</button>
    <a href="{% url 'justice:youngperson-list' %}" class="btn">Cancel</a>
</form>
{% endblock %}
